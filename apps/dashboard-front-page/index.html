<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Virginia Works</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
           margin: 0; padding: 32px; background: #f0eee9; color: #1a1f2c; }
    .placeholder { max-width: 760px; margin: 0 auto; padding: 32px;
                   background: #fff; border: 1px solid #cdd3df; border-radius: 6px; }
    h1 { font-family: "Source Serif Pro", Georgia, serif; margin: 0 0 8px; }
    p  { color: #5a6376; }
    #chart { height: 400px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="placeholder">
    <h1>Dashboard placeholder</h1>
    <p>Replace this with the real Highcharts dashboard. The Vercel deploy pipeline is wired and serving this folder.</p>
    <div id="chart"></div>
  </div>
  <script>
    Highcharts.chart('chart', {
      title: { text: 'Sample chart — replace me' },
      series: [{ data: [1, 3, 2, 4, 5, 4, 6, 7], type: 'line' }],
      credits: { enabled: false },
    });
  </script>
